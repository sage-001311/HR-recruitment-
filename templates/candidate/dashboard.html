{% extends 'base.html' %}
{% block content %}
<h2>Jobs</h2>
{% for job in jobs %}
<div class="card">
<h3>{{job.title}}</h3>
<p>{{job.description}}</p>
<form method="POST" action="/apply/{{job.id}}" enctype="multipart/form-data">
<input type="file" name="resume">
<button>Apply</button>
</form>
</div>
{% endfor %}
<a href="/status"><button>View My Applications</button></a>
{% endblock %}
